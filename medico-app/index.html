<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply theme class before first paint to prevent flash of wrong theme -->
    <script>
      (function () {
        var stored = localStorage.getItem('neetpg_theme');
        var isDark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="NEET PG Previous Year Questions practice app" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Medico PYQ" />
    <title>Medico PYQ - NEET PG</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
